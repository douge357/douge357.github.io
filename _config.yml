title: douge357
name: douge357
description: 段续衍的个人主页，包含 Web3 UI 设计经历、项目与中英文简历。
url: "https://douge357.github.io"
baseurl: ""
repository: "douge357/douge357.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin: "air"
locale: "zh-CN"

plugins:
  - jekyll-include-cache

markdown: kramdown
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/

include:
  - _pages

author:
  name: "段续衍 / douge357"
  bio: "Web3 UI Designer with 9 years of product and visual design experience."
  location: "China"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:382723848@qq.com"
    - label: "Phone"
      icon: "fas fa-fw fa-phone"
      url: "tel:17582929710"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/douge357"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false

collections:
  pages:
    output: true
    permalink: /:path/

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/douge357"

atom_feed:
  hide: false

search: true
