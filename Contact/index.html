<body>
  <div class="page-shell">
    <header class="site-header">

    <main class="contact-page">
      <section class="skills-stage" aria-label="&#25216;&#33021;&#21160;&#25928;&#23637;&#31034;">
        <div class="skills-scene" id="skills-scene">
          <div class="skill-node skill-node--sketch" data-depth="18">

              <span class="diamond diamond--left"></span>

              <span class="figma-dot figma-orange"></span>
              <span class="figma-dot figma-purple"></span>
              <span class="figma-dot figma-blue"></span>
              <span class="figma-dot figma-green"></span>

          <div class="skill-node skill-node--ue5" data-depth="24">

          <div class="skill-node skill-node--illustrator" data-depth="20">
